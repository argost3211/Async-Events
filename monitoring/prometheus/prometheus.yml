global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "event-generator"
    static_configs:
      - targets: ["event-generator:8002"]
    metrics_path: /metrics

  - job_name: "producer"
    static_configs:
      - targets: ["producer:8000"]
    metrics_path: /metrics

  - job_name: "consumer"
    static_configs:
      - targets: ["consumer:8001"]
    metrics_path: /metrics
