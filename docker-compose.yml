services:
  db:
    image: postgres
    container_name: db
    restart: always
    command: ["postgres", "-c", "max_connections=100"]
    volumes:
      - ./pgdata:/var/lib/postgresql
    env_file:
      - .env
    ports:
      - "5432:5432"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "90"
      MAX_CLIENT_CONN: "500"
    ports:
      - "6432:5432"


  broker:
    image: apache/kafka:latest
    container_name: broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  producer:
    container_name: producer
    build: .
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
    depends_on:
      - pgbouncer
      - broker
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    command: uvicorn producer.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      start_period: 30s
      timeout: 5s
      retries: 3

  consumer:
    container_name: consumer
    build: .
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
    depends_on:
      - pgbouncer
      - broker
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "5432"
    ports:
      - "8001:8001"
    command: python -m consumer.main

  event-generator:
    container_name: event-generator
    build: .
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
    depends_on:
      producer:
        condition: service_healthy
    env_file:
      - .env
    environment:
      GENERATOR_PRODUCER_BASE_URL: http://producer:8000
    ports:
      - "8002:8002"
    command: python -m event_generator.main

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - producer
      - consumer
      - event-generator
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards